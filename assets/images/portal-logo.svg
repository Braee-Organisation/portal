<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 225 64" width="225" height="64">
  <!-- Portal logo — transparent background -->

  <!-- Icon: archway/portal shape on indigo-blue rounded square -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#1A5276"/>

  <!-- Outer arch -->
  <path d="M12 50 L12 28 Q12 12 32 12 Q52 12 52 28 L52 50" fill="none" stroke="#AED6F1" stroke-width="3" stroke-linecap="round"/>

  <!-- Inner arch -->
  <path d="M20 50 L20 30 Q20 22 32 22 Q44 22 44 30 L44 50" fill="none" stroke="#EAF4FC" stroke-width="3" stroke-linecap="round"/>

  <!-- Ground bar -->
  <rect x="10" y="49" width="44" height="4" rx="2" fill="#2E86C1"/>

  <!-- Glow dot at apex -->
  <circle cx="32" cy="12" r="3.5" fill="#85C1E9"/>

  <!-- Wordmark -->
  <text x="80" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#1A1A1A" letter-spacing="-0.5">Portal</text>
  <text x="80" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6B6B6B">Braee Organisation</text>
</svg>
