<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login | Portal | Braee Organisation</title>
        <link rel="icon" type="image/x-icon" href="/assets/images/portal-icon.svg">
        <link rel="stylesheet" href="/frontend/css/styles.css">
    </head>

    <body class="loginPage">        <!-- Main page content, holds login page assets -->
        <div id="loginContainer">
            <img src="/assets/images/portal-logo-black.svg" alt="Portal Logo (Black)">
            <h3>Welcome to Portal, please enter your login credentials below</h3>
            <form id="loginForm">   <!-- Login form for site, holds relevant fields -->
                <div>
                    <label for="username">Enter your username:</label>
                    <input type="text" name="username" id="username"/>
                </div>
                <div>
                    <label for="password">Enter your password:</label>
                    <input type="password" name="password" id="password"/>
                </div>
                <div id="rememberSubmitRow">
                    <div id="rememberMeContainer">
                        <label for="rememberme">Remember me</label>
                        <input id="rememberme" name="rememberme" value="remember" type="checkbox"/>
                    </div>
                    <button id="submitButton" type="submit">Login</button>
                </div>
            </form>
            <div id="copyrightText">
                Copyright © 2026 Braee Organisation.<br>All rights reserved.
            </div>
        </div>
    </body>
</html>
